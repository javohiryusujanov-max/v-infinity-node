<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-INFINITY SINGULARITY V50</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --neon-green: #00ff41; --neon-purple: #bc13fe; --neon-blue: #00d4ff; --bg-dark: #050505; --panel: #111; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', monospace; margin: 0; padding: 15px; }
        .terminal { border: 2px solid var(--neon-green); border-radius: 10px; padding: 15px; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 15px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--panel); border: 1px solid #222; padding: 12px; border-radius: 5px; position: relative; overflow: hidden; }
        .card h3 { margin: 0; font-size: 0.7rem; color: #888; letter-spacing: 1px; }
        .card .val { font-size: 1.6rem; font-weight: bold; color: var(--neon-green); margin: 5px 0; }
        .card .conf { font-size: 0.6rem; color: var(--neon-blue); }
        .hunter { grid-column: span 2; border-color: var(--neon-purple); }
        .hunter .val { color: var(--neon-purple); }
        
        .input-zone { margin-top: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid var(--neon-green); color: white; padding: 15px; font-size: 1.2rem; border-radius: 5px; outline: none; text-align: center; }
        button { background: var(--neon-green); color: black; border: none; padding: 0 25px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        .kelly-box { margin-top: 15px; background: #1a1a00; border: 1px solid #555500; padding: 10px; font-size: 0.8rem; color: #ffff00; text-align: center; }
        .history-log { margin-top: 15px; font-size: 0.8rem; color: #555; height: 40px; overflow: hidden; border-top: 1px solid #222; padding-top: 10px; }
        .status-line { display: flex; justify-content: space-between; font-size: 0.7rem; margin-top: 10px; color: #444; }
        .glow { text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div style="font-weight: bold; font-size: 1.1rem; color: var(--neon-green);">V-INFINITY NEURAL CORE</div>
        <div style="font-size: 0.6rem; color: var(--neon-blue);">MOLECULAR CALCULUS ENGINE V50</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>🛡️ SHIELD (95%)</h3>
            <div class="val" id="shield">--</div>
            <div class="conf">PROBABILITY: 94.8%</div>
        </div>
        <div class="card">
            <h3>🔱 SPEAR (75%)</h3>
            <div class="val" id="spear">--</div>
            <div class="conf">PROBABILITY: 74.2%</div>
        </div>
        <div class="card hunter">
            <h3>🔱 POISSON HUNTER (GAP: <span id="gap">0</span>r)</h3>
            <div class="val" id="hunter">WAITING...</div>
            <div class="conf" id="ripeness">RIPENESS: 0.0%</div>
        </div>
    </div>

    <div class="kelly-box" id="advice">
        CALIBRATING MATH KERNEL... INPUT 3 ROUNDS
    </div>

    <div class="input-zone">
        <input type="number" id="in" step="0.01" placeholder="LAST CRASH" inputmode="decimal">
        <button onclick="add()">ADD</button>
    </div>

    <div class="history-log" id="hist">...</div>

    <div class="status-line">
        <span>MODE: <span id="state" style="color:var(--neon-green)">SYNCING</span></span>
        <span>CV: <span id="cv">--</span></span>
        <span>localR: <span id="rtp">--</span></span>
    </div>
    
    <button onclick="wipe()" style="width:100%; background:transparent; color:#333; border:1px solid #222; margin-top:10px; font-size:0.6rem; padding:5px;">WIPE DATA-LAKE</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('vinf_db') || '[]');
    const C = 0.97; // Spribe Constant

    function add() {
        const el = document.getElementById('in');
        const v = parseFloat(el.value);
        if (!isNaN(v) && v >= 1) {
            db.unshift(v);
            if (db.length > 50) db.pop();
            localStorage.setItem('vinf_db', JSON.stringify(db));
            el.value = '';
            calc();
        }
    }

    function wipe() { if(confirm("Clear RAM?")) { db=[]; localStorage.clear(); location.reload(); } }

    function calc() {
        if (db.length < 3) return;

        const n = Math.min(db.length, 20);
        const slice = db.slice(0, n);
        
        // 1. MOLECULAR CALCULUS
        const avg = math.mean(slice);
        const std = math.std(slice);
        const cv = std / avg; // Coefficient of Variation
        
        // 2. DYNAMIC ENTROPY (Squeeze detection)
        const coldCount = slice.filter(x => x < 1.3).length;
        const entropy = coldCount / n;
        
        // 3. EINSTEIN DYNAMIC RTP
        // We calculate if the game is 'Owed' or 'Taxed'
        const localR = C + (entropy * 0.06) - (cv * 0.02);

        // 4. SHIELD & SPEAR (Confidence Intervals)
        let s = localR / 0.95; // 95% Chance
        let m = localR / 0.75; // 75% Chance
        
        // Apply volatility pressure
        if (cv > 1.5) { s *= 0.98; m *= 0.90; } // Volatility squeeze
        if (s > 1.30) s = 1.25;

        // 5. POISSON HUNTER
        const lastPink = db.findIndex(x => x >= 10);
        const gap = lastPink === -1 ? db.length : lastPink;
        const ripeness = (gap / 120) * 100;
        let h = Math.max(15, avg * (1 + (gap/10)));

        // UI UPDATES
        document.getElementById('shield').innerText = s.toFixed(2) + 'x';
        document.getElementById('spear').innerText = m.toFixed(2) + 'x';
        document.getElementById('gap').innerText = gap;
        document.getElementById('ripeness').innerText = `RIPENESS: ${ripeness.toFixed(1)}%`;
        document.getElementById('cv').innerText = cv.toFixed(2);
        document.getElementById('rtp').innerText = (localR*100).toFixed(1) + '%';
        document.getElementById('hist').innerText = db.slice(0,10).join(' | ');

        const stateEl = document.getElementById('state');
        const adviceEl = document.getElementById('advice');

        if (entropy > 0.5) {
            stateEl.innerText = "RECOVERY ⚖️"; stateEl.style.color = "orange";
            adviceEl.innerText = "⚠️ HOUSE TAXING: PLAY ONLY SHIELD BET";
        } else if (ripeness > 85) {
            stateEl.innerText = "🔱 UNICORN HUNT"; stateEl.style.color = "var(--neon-purple)";
            adviceEl.innerText = "🚀 POISSON PEAK REACHED: SMALL BET ON HUNTER";
            document.getElementById('hunter').innerText = h.toFixed(2) + 'x';
        } else {
            stateEl.innerText = "STABLE 🟢"; stateEl.style.color = "var(--neon-green)";
            adviceEl.innerText = "✅ OPTIMAL FLOW: DUAL BET ACTIVE";
        }
    }

    if (db.length >= 3) calc();
    document.getElementById('in').addEventListener('keypress', (e) => { if(e.key==='Enter') add(); });
</script>
</body>
</html>
